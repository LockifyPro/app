# Render.com Blueprint for PasswordAndLock SaaS
# Deploy both backend and frontend from this single config

services:
  # Backend API Service
  - type: web
    name: passwordandlock-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # You'll set this manually with your MongoDB Atlas connection string
      - key: DB_NAME
        value: passwordandlock
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 1440
      - key: STRIPE_API_KEY
        sync: false  # Set your Stripe API key
      - key: CORS_ORIGINS
        sync: false  # Set to your frontend URL, e.g., https://passwordandlock.onrender.com
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: passwordandlock
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: frontend/build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # Set to your backend URL, e.g., https://passwordandlock-api.onrender.com
